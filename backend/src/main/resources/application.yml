server:
  port: 8080

spring:
  application:
    name: architect-ledger

  datasource:
    url: ${DB_URL:jdbc:h2:mem:architectledger;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: ${DB_DRIVER:org.h2.Driver}

  h2:
    console:
      enabled: true
      path: /h2-console

  # ── MySQL (Production — uncomment & comment out H2 block above) ────────────
  # datasource:
  #   url: jdbc:mysql://localhost:3306/architect_ledger?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
  #   username: root
  #   password: root
  #   driver-class-name: com.mysql.cj.jdbc.Driver
  #   hikari:
  #     connection-timeout: 20000
  #     maximum-pool-size: 10

  jpa:
    hibernate:
      ddl-auto: ${DB_DDL_AUTO:update}
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: ${DB_DIALECT:org.hibernate.dialect.H2Dialect}
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    time-zone: UTC

app:
  jwt:
    secret: ${JWT_SECRET:NGI3ZTJhOWYzYzhkMWU2YjVhMGY5YzJkN2U0YjFhOGYzYzZlOWQyYjVhN2YwYzNlNmQ5YjJhNWY4YzFlNGQ3}
    expiration-ms: 86400000

  cors:
    allowed-origins: ${ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

logging:
  level:
    com.architectledger: INFO
    org.springframework.security: WARN
